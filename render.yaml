services:
  - type: web
    name: obscura
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CREDIT_PRICE_CENTS
        value: "50"
      - key: MAX_BUY_CREDITS
        value: "1000"
      - key: AUTO_APPROVE_PURCHASES
        value: "1"
      - key: ENABLE_DEV_TOPUP
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: obscura-db
          property: connectionString

databases:
  - name: obscura-db
    plan: free
